<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QuerySense – Query Optimizer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 30px;
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }
    .container {
      background: rgba(255, 255, 255, 0.9);
      padding: 20px;
      max-width: 600px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
}
    textarea {
      width: 100%;
      height: 80px;
      margin-top: 10px;
    }
    button {
      margin-top: 10px;
      padding: 10px 15px;
      cursor: pointer;
    }
    .result {
      margin-top: 20px;
      background: #eef;
      padding: 15px;
      border-radius: 5px;
    }
    pre {
      white-space: pre-wrap;      
      word-wrap: break-word;      
      overflow-x: auto;            
    }
    button {
      margin-top: 10px;
      padding: 10px 18px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #4CAF50;
      color: white;
      font-weight: bold;
      transition: background-color 0.3s ease, transform 0.1s ease;
    }

    button:hover {
      background-color: #45a049;
      transform: scale(1.05);
    }
  </style>
</head>

<body>
<div class="container">
  <h1><center>QuerySense</center></h1>
  <p>Enter your search query:</p>
  <textarea id="query" placeholder="Type your query here..."></textarea>
  <br>
  <button onclick="optimize()">Optimize Query</button>
  <div class="result" id="output" style="display:none;">
    <h4>Optimized Result:</h4>
    <pre id="resultText"></pre>
    <p>If this is not correct, refine it:</p>
    <textarea id="feedback" placeholder="if you want to make it specific, you enhace here eg.Add year etc.."></textarea>
    <br>
    <button onclick="refine()">Refine Query</button>
    <p id="loading" style="display:none;">AI is thinking...</p>
    <h4>Previous Queries</h4>
    <ul id="history"></ul>
  </div>
</div>

<script>
  async function optimize() {
    const query = document.getElementById("query").value;
    document.getElementById("loading").style.display = "block";
    const response = await fetch("http://127.0.0.1:8000/optimize",{
       method: "POST",
       headers: { "Content-Type": "application/json" },
       body: JSON.stringify({ query: query, feedback: null })
    });
    const data = await response.json();
    document.getElementById("loading").style.display = "none";
    document.getElementById("resultText").textContent = data.result;
    document.getElementById("output").style.display = "block";
    updateHistory(data.history);
  }

  async function refine() {
    const query = document.getElementById("query").value;
    const feedback = document.getElementById("feedback").value;
    document.getElementById("loading").style.display = "block";
    const response = await fetch("http://127.0.0.1:8000/optimize", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query: query, feedback: feedback })
    });
    const data = await response.json();
    document.getElementById("loading").style.display = "none";
    document.getElementById("resultText").textContent = data.result;
    updateHistory(data.history);
    document.getElementById("feedback").value = "";
  }

  function updateHistory(history){
    const historyList = document.getElementById("history");
    historyList.innerHTML = "";
    history.forEach((q)=>{
        const li = document.createElement("li");
        li.textContent = q;
        li.onclick = function(){
            document.getElementById("query").value = q;
        };
        historyList.appendChild(li);
    });
  }
</script>
</body>
</html>
